<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLens</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --productive: #00e5a0;
    --unproductive: #ff4d6d;
    --neutral: #ffd166;
    --accent: #7c3aed;
  }

  body {
    width: 340px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #12121a 0%, #1a1025 100%);
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    background: radial-gradient(circle, rgba(124,58,237,0.3) 0%, transparent 70%);
    border-radius: 50%;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #7c3aed, #00e5a0);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .logo-text {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #e8e8f0, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
  }

  .current-site {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .site-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }

  .site-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .site-domain {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .site-timer {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }

  .category-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-top: 8px;
  }

  .badge-productive { background: rgba(0,229,160,0.12); color: var(--productive); border: 1px solid rgba(0,229,160,0.2); }
  .badge-unproductive { background: rgba(255,77,109,0.12); color: var(--unproductive); border: 1px solid rgba(255,77,109,0.2); }
  .badge-neutral { background: rgba(255,209,102,0.12); color: var(--neutral); border: 1px solid rgba(255,209,102,0.2); }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-card {
    background: var(--surface);
    padding: 14px 12px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .stat-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .score-bar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .score-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .score-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .score-pct {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
  }

  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }

  .bar-segment {
    height: 100%;
    transition: width 0.8s ease;
  }

  .top-sites {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 12px;
  }

  .site-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }

  .site-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .site-row-domain {
    flex: 1;
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .site-row-time {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .actions {
    padding: 12px 20px;
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: white;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

  .empty-state {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🔍</div>
    <span class="logo-text">FocusLens</span>
  </div>
  <div class="tagline">// productivity intelligence</div>
</div>

<div class="current-site">
  <div class="site-label">Currently Active</div>
  <div class="site-info">
    <span class="site-domain" id="currentDomain">Loading...</span>
    <span class="site-timer" id="currentTimer">00:00:00</span>
  </div>
  <div id="categoryBadge" class="category-badge badge-neutral">⚪ Neutral</div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-value" id="statProductive" style="color:var(--productive)">0h 0m</div>
    <div class="stat-label">Productive</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statUnproductive" style="color:var(--unproductive)">0h 0m</div>
    <div class="stat-label">Distracted</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statTotal" style="color:var(--accent)">0h 0m</div>
    <div class="stat-label">Total Today</div>
  </div>
</div>

<div class="score-bar">
  <div class="score-header">
    <span class="score-title">Today's Score</span>
    <span class="score-pct" id="scoreValue">—</span>
  </div>
  <div class="bar-track">
    <div class="bar-segment" id="barProductive" style="background:var(--productive);width:0%"></div>
    <div class="bar-segment" id="barNeutral" style="background:var(--neutral);width:0%"></div>
    <div class="bar-segment" id="barUnproductive" style="background:var(--unproductive);width:0%"></div>
  </div>
</div>

<div class="top-sites">
  <div class="section-title">Today's Top Sites</div>
  <div id="topSitesList"></div>
</div>

<div class="actions">
  <button class="btn btn-primary" id="openDashboard">📊 Full Dashboard</button>
  <button class="btn btn-secondary" id="openSettings">⚙ Settings</button>
</div>

<script src="popup.js"></script>
</body>
</html>
